<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/b1n0-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f2ec" media="(prefers-color-scheme: light)" />

    <!-- PWA — Android/Chrome -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- PWA — iOS Safari fallback (Apple ignores manifest.webmanifest) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="b1n0" />
    <link rel="apple-touch-icon" href="/b1n0-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/b1n0-logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/b1n0-logo.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/b1n0-logo.png" />
    <meta name="description" content="b1n0 — La plataforma de opinión donde demostrás que sabés más que todos. Hacé tu llamado en fútbol, economía y cultura de Centroamérica." />
    <meta name="keywords" content="predicciones, opinión, fútbol, Guatemala, El Salvador, Honduras, Centroamérica" />
    <meta name="author" content="b1n0" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="b1n0" />
    <meta property="og:description" content="La plataforma de opinión patrocinada para Centroamérica. Demostrá que sabés más que todos." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://b1n0.app" />
    <meta property="og:locale" content="es_GT" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="b1n0" />
    <meta name="twitter:description" content="La plataforma de opinión patrocinada para Centroamérica." />
    <meta name="twitter:image" content="/og-image.png" />

    <title>b1n0</title>

    <!-- Structured data — helps Google understand b1n0 as a brand
         and decide on sitelinks. Two schemas:
           Organization — identity, logo
           WebSite — search action so a Google sitelink may render -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.b1n0.com/#org",
          "name": "b1n0",
          "url": "https://www.b1n0.com",
          "logo": "https://www.b1n0.com/b1n0-logo.png",
          "description": "La plataforma de opinión patrocinada para Centroamérica.",
          "areaServed": ["GT", "SV", "HN", "NI", "CR"]
        },
        {
          "@type": "WebSite",
          "@id": "https://www.b1n0.com/#website",
          "name": "b1n0",
          "url": "https://www.b1n0.com",
          "inLanguage": "es",
          "publisher": { "@id": "https://www.b1n0.com/#org" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://www.b1n0.com/inicio?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Type system:
        Inter        — body, UI labels, default. Variable axis 100-900.
        Geist        — display + UI numbers. More characterful geometric sans.
        Geist Mono   — code, raw data, tx hashes, anything that needs to feel like a terminal.
        Syne         — hero headlines (event questions, primary balance). Kept from previous system.

      All on Google Fonts via a single request. Variable axes keep the
      payload small (~140KB combined) compared to fixed-weight imports.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..900&family=Geist:wght@400..900&family=Geist+Mono:wght@400..700&family=Syne:wght@500..800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
