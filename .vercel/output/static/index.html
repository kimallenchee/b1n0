    <!-- Structured data — helps Google understand b1n0 as a brand
         and decide on sitelinks. Two schemas:
           Organization — identity, logo
           WebSite — search action so a Google sitelink may render -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.b1n0.com/#org",
          "name": "b1n0",
          "url": "https://www.b1n0.com",
          "logo": "https://www.b1n0.com/brand/b1n0-logo-white.png",
          "description": "La plataforma de opinión de Centroamérica donde demostrás que sabés más que todos.",
          "areaServed": ["GT", "SV", "HN", "NI", "CR"]
        },
        {
          "@type": "WebSite",
          "@id": "https://www.b1n0.com/#website",
          "name": "b1n0",
          "url": "https://www.b1n0.com",
          "inLanguage": "es",
          "publisher": { "@id": "https://www.b1n0.com/#org" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://www.b1n0.com/inicio?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <!-- Type system: Inter + InterDisplay (self-hosted via /public/fonts/). See src/index.css @font-face. -->

    <!-- Google Translate Element — used by the ES/EN footer toggle to
         live-translate page content that's not covered by our own i18n
         JSON. Loaded eagerly here in <head> (not lazily from JS) because
         the widget's auto-translate-from-cookie behavior fires during
         init and only works when init runs early in the page lifecycle.
         Loading lazily from a React effect was too late — by the time
         the script ran, the body was already rendered and Google never
         translated it. The cost of the eager load is ~80 KB which we
         accept; this is what every working Google Translate site does.

         The script gates itself on a `googtrans` cookie. With no
         cookie set, the widget renders its (off-screen) UI but does
         not modify page content. When the user toggles EN in the
         footer, we set the cookie and reload — on the next paint the
         widget reads the cookie and translates the body in place. -->
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'es', includedLanguages: 'en', autoDisplay: false },
          'google_translate_element'
        )
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
    <style>
      /* Hide Google's branded top bar, in-page tooltip, and hover glow.
         The widget itself still runs — we just keep the page chrome
         clean. .skiptranslate is intentionally NOT hidden here because
         it's a marker class Google applies to elements that should not
         be translated (e.g. our wallet numbers); hiding it would hide
         legitimate content. We target only Google's *injected* chrome. */
      .goog-te-banner-frame.skiptranslate,
      .goog-te-banner-frame,
      #goog-gt-tt,
      .goog-tooltip,
      .goog-tooltip:hover {
        display: none !important;
      }
      body { top: 0 !important; position: static !important; }
      /* Suppress the hover-highlight glow Google adds to translated text. */
      .goog-text-highlighted {
        background-color: transparent !important;
        box-shadow: none !important;
      }
      /* The mount itself — visible to Google's layout calc but
         positioned far off-screen so it never reaches the viewport. */
      #google_translate_element {
        position: absolute;
        left: -10000px;
        top: -10000px;
        width: 1px;
        height: 1px;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
      }
    </style>
    <div id="google_translate_element"></div>
    <script type="module" crossorigin src="/assets/index-C-CluPAf.js"></script>
